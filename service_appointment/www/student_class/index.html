{% extends "templates/web.html" %}

{% block title %}{{ _("صفوف الطلاب") }}{% endblock %}

{% block script %}
<script src="assets/js/moment-bundle.min.js"></script>
<script src="student_class/index.js"></script>
{% endblock %}

{% block page_content %}
<div class="container">
    <!-- title: Book an appointment -->
    <div id="select-date-time" style="direction: rtl;">
        <div class="text-center mt-5">
            <h1>مدرسة جدحفص الاعدادية للبنين</h1>
        </div>
        <div class="text-center mt-5">
            <h3>صفوف الطلاب</h3>
            <p class="lead text-muted" id="lead-text">ادخل الرقم الشخصي للطالب</p>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-6 align-self-center ">
                <div class="row">
                    <input class="form-control mt-3" type="number" name="cpr" id="cpr" placeholder="الرقم الشخصي" required>
                </div>
            </div>
        </div>
        <div class="mt-3" id="timeslot-container">

        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-4 mb-3">
                <button class="btn btn-primary form-control" id="next-button" onclick="get_student_class()">ارسال</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
